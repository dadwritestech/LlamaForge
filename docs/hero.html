<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Source for docs/hero.png. Regenerate at 1280x420 with Chrome headless:
     chrome --headless --disable-gpu --force-device-scale-factor=2 \
       --window-size=1280,420 --virtual-time-budget=4000 \
       --screenshot=docs/_hero_2x.png file:///.../docs/hero.html
     then downscale _hero_2x.png (2560x840) -> docs/hero.png with LANCZOS. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0b;--panel:#0f1315;--panel2:#141a1d;--hair:#1e262a;
  --ink:#c8d2d4;--dim:#6b7a7e;--amber:#ffb000;--amber-dim:#7a5600;
  --cyan:#3fd7e6;--green:#39d98a;--red:#ff5c57;--grid:#0d1214;
  --mono:'JetBrains Mono',ui-monospace,monospace;--disp:'Chakra Petch',var(--mono);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1280px;height:420px;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--mono)}
.hero{position:relative;width:1280px;height:420px;overflow:hidden;border:1px solid var(--hair);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:44px 44px;display:flex;align-items:center;justify-content:space-between;padding:0 60px}
.hero::before{content:"";position:absolute;left:-120px;top:-160px;width:760px;height:620px;
  background:radial-gradient(circle at center,rgba(255,176,0,.20),rgba(255,176,0,.05) 40%,transparent 66%);pointer-events:none}
.hero::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0,rgba(0,0,0,.16) 1px,transparent 1px,transparent 3px);
  mix-blend-mode:multiply;opacity:.5}
.left{position:relative;z-index:2;display:flex;gap:26px;align-items:flex-start}
.logo{width:74px;height:74px;border:2px solid var(--amber);position:relative;flex:none;margin-top:16px}
.logo::before{content:"";position:absolute;left:14px;right:14px;top:50%;height:4px;transform:translateY(-2px);
  background:var(--amber);box-shadow:0 -18px 0 var(--amber),0 18px 0 var(--amber)}
h1{font-family:var(--disp);font-weight:700;letter-spacing:.10em;font-size:74px;line-height:.94;color:#fff}
h1 span{color:var(--amber)}
.sub{color:var(--dim);font-size:15px;letter-spacing:.30em;text-transform:uppercase;margin:14px 0 26px;font-family:var(--disp)}
.chips{display:flex;flex-wrap:wrap;gap:11px;max-width:610px}
.chip{background:var(--panel2);border:1px solid var(--hair);padding:11px 15px;font-size:13.5px;line-height:1.3}
.chip b{font-family:var(--disp);font-weight:700;letter-spacing:.04em}
.chip .amber{color:var(--amber)}.chip .green{color:var(--green)}.chip .cyan{color:var(--cyan)}
.chip span{color:var(--dim)}
.panel{position:relative;z-index:2;width:352px;background:rgba(15,19,21,.85);border:1px solid var(--hair);padding:16px 18px;flex:none}
.phead{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
.phead .g{color:var(--dim)}.phead .v{color:var(--amber);font-family:var(--disp);font-weight:600}
.meter{height:26px;background:#0a0d0e;border:1px solid var(--hair);display:flex;gap:2px;padding:3px;margin:12px 0 16px}
.seg{flex:1;background:#12181a}.seg.on{background:var(--amber);box-shadow:0 0 6px var(--amber-dim)}
.mrow{display:flex;align-items:center;gap:10px;padding:10px 2px;border-top:1px solid #131a1c}
.led{width:9px;height:9px;border-radius:50%;background:#33403f;flex:none}
.led.loaded{background:var(--green);box-shadow:0 0 8px var(--green)}
.mname{flex:1;color:#e6eeef;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mtag{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);border:1px solid var(--hair);padding:2px 7px}
.mtag.load{color:var(--green);border:none}.mtag.fit{color:var(--green);border-color:#1f4a37}
.be{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border:1px solid var(--hair)}
.be.cpp{color:var(--amber);border-color:var(--amber-dim)}.be.vllm{color:var(--green);border-color:#1c402c}
.qbtn{font-family:var(--disp);font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:9px;
  padding:4px 9px;border:1px solid var(--amber-dim);color:var(--amber)}
.qbtn.stop{border-color:var(--hair);color:var(--dim)}
</style>
</head>
<body>
<div class="hero">
  <div class="left">
    <div class="logo"></div>
    <div>
      <h1>LLAMA<span>FORGE</span></h1>
      <div class="sub">a control panel for llama.cpp &middot; and vLLM</div>
      <div class="chips">
        <div class="chip"><b class="amber">220+</b> <span>knobs, per&#8209;model</span></div>
        <div class="chip"><b class="green">llama.cpp</b> <span>+</span> <b class="green">vLLM</b></div>
        <div class="chip"><b class="cyan">Win &middot; Linux &middot; macOS</b></div>
        <div class="chip"><b class="cyan">VRAM&#8209;fit</b> <span>discovery</span></div>
        <div class="chip"><b class="amber">presets</b> <span>&middot;</span> <b class="amber">compare</b> <span>&middot;</span> <b class="amber">resume</b></div>
        <div class="chip"><b class="green">0</b> <span>dependencies</span></div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="phead"><span class="g">GPU 0 &middot; RTX 5080</span><span class="v">13.2 / 16 GB</span></div>
    <div class="meter">
      <div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div>
      <div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div>
      <div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div>
      <div class="seg on"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div>
    </div>
    <div class="mrow"><span class="led loaded"></span><span class="mname">qwopus-coder</span><span class="be cpp">llama.cpp</span><span class="qbtn stop">Unload</span></div>
    <div class="mrow"><span class="led"></span><span class="mname">gemma-4-12b</span><span class="be vllm">vLLM</span><span class="qbtn">Load</span></div>
    <div class="mrow"><span class="led"></span><span class="mname">deepseek-v4-flash</span><span class="be cpp">llama.cpp</span><span class="mtag fit">Fits</span></div>
  </div>
</div>
</body>
</html>
